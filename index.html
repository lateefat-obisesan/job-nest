<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="author" content="Lateefat Obisesan">
        <meta name="description" content="job-nest">
        <meta name="keywords" content="html, css, web, web development, MapBox, javascript">
        <link rel="icon" href="./assets/media/favicon.png" type="image/x-icon">
        <script src="./assets/script/index.js" type="module" defer></script>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap">
        <link rel="stylesheet" href="./assets/style/index.css" media="all">
        <title>JOB-NEST</title>
    </head>
    <body>
        <main class="login-wrapper">
    <section class="login-left">
        <img src="./assets/media/login-image.jpeg" alt="Login image" class="login-image">
    <div class="login-logo">
    <h1>Job-Nest</h1>
    </div>
    </section>
    <section class="login-right">
        <div class="login-content">
            <h2>Welcome Back</h2>
           <p class="login-text"> Sign in to continue your professional journey. </p>
            <p class="login-subtext"> Connect with opportunities, people, and careers. </p>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <p id="login-error"></p>
            </form>
            <div class="auth-buttons"> 
                <button type="submit"> Login </button>
                <button type="button" class="signup-btn"> Sign Up </button>
            </div>
        </div>
         <p class="account-text">
           Don't have an account?
        </p>
        <div class="login-links">
            <a href="#">Privacy Policy</a>
            <span>|</span>
            <a href="#">Terms</a>
            <span>|</span>
            <a href="#">Copyright</a>
        </div>
       </section>
      </main>
    </body>
</html>
