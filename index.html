<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="author" content="Lateefat Obisesan">
        <meta name="description" content="job-nest">
        <meta name="keywords" content="html, css, web, web development, MapBox, javascript">
        <link rel="icon" href="./assets/media/favicon.png" type="image/x-icon">
        <script src="./assets/script/index.js" type="module" defer></script>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap">
        <link rel="stylesheet" href="./assets/style/index.css" media="all">
        <title>JOB-NEST</title>
    </head>
    <body>
        <main class="login-wrapper">
    <section class="login-left">
       <div class="login-logo">
    <img 
        src="./assets/media/login-image.avif" 
        alt="Login image"
        class="login-image"
    >
    <h1>Job-Nest</h1>
    </div>
    </section>
    <section class="login-right">
        <div class="login-content">
            <h2>Welcome Back</h2>
            <p class="login-text">
                Login to continue to your account
            </p>
            <p class="login-subtext">
            Access your professional network and opportunities.
            </p>
            <form id="login-form">
                <input
                    type="text"
                    id="username"
                    placeholder="Username"
                    required
                >
                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >
                <p id="login-error"></p>
                <button type="submit">
                    Login
                </button>
            </form>
            <button type="button" class="signup-btn">
            Sign Up
            </button>
        </div>
         <p class="account-text">
           Don't have an account?
        </p>
        <div class="login-links">
            <a href="#">Privacy Policy</a>
            <span>|</span>
            <a href="#">Terms</a>
            <span>|</span>
            <a href="#">Copyright</a>
        </div>
       </section>
      </main>
    </body>
</html>
